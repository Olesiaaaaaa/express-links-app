    <style>
      /* 
       * Проблема: в flex-контейнере img с width:auto может схлопнуться в 0px.
       * Решение: явно задаём min-width и flex-shrink.
       * Этот блок идёт ПОСЛЕ внешнего CSS, поэтому имеет приоритет.
       */
      .container img {
        min-width: 48px !important; /* не давать сжиматься уже 48px */
        flex-shrink: 0 !important; /* запретить сжатие во flex-контейнере */
        display: block !important; /* убрать артефакты inline-элементов */
        object-fit: contain !important; /* сохранять пропорции */
      }
